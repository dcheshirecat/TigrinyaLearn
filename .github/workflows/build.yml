name: Build Tigrinya APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate keystore
        run: |
          mkdir -p app
          keytool -genkey -v \
            -keystore app/keystore.jks \
            -alias tigrinya \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass TigrinyaBuild2024 \
            -keypass TigrinyaBuild2024 \
            -dname "CN=Tigrinya Learn, OU=dcheshirecat, O=Studio, L=Unknown, ST=Unknown, C=US"

      - name: Build project structure
        run: |
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/dcheshirecat/tigrinya
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper

          cp index.html app/src/main/assets/index.html

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.dcheshirecat.tigrinya">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="ትግርኛ Learn"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen"
                  android:hardwareAccelerated="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#0e0a06">
              <WebView
                  android:id="@+id/webview"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent" />
          </RelativeLayout>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">ትግርኛ Learn</string>
          </resources>
          EOF

          cat > app/src/main/java/com/dcheshirecat/tigrinya/MainActivity.java << 'EOF'
          package com.dcheshirecat.tigrinya;
          import android.app.Activity;
          import android.os.Bundle;
          import android.view.WindowManager;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.view.View;
          public class MainActivity extends Activity {
              private WebView webView;
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  getWindow().getDecorView().setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_FULLSCREEN | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY);
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings ws = webView.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setLoadWithOverviewMode(true);
                  ws.setUseWideViewPort(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }
              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
          }
          EOF

          # Generate icons using ImageMagick
          for entry in "48:mipmap-mdpi" "72:mipmap-hdpi" "96:mipmap-xhdpi" "144:mipmap-xxhdpi" "192:mipmap-xxxhdpi"; do
            size="${entry%%:*}"
            folder="${entry##*:}"
            half=$((size / 2))
            inner=$((size * 44 / 100))
            stroke=$((size / 18))
            fs=$((size * 38 / 100))
            for name in ic_launcher.png ic_launcher_round.png; do
              magick -size ${size}x${size} xc:"#0e0a06" \
                -fill "#2a1409" -draw "circle ${half},${half} ${half},$((size/6))" \
                -stroke "#d4a017" -strokewidth ${stroke} -fill none \
                -draw "circle ${half},${half} ${half},$((size/9))" \
                -fill "#f0c040" -font DejaVu-Sans-Bold -pointsize ${fs} \
                -gravity Center -annotate 0 "T" \
                "app/src/main/res/${folder}/${name}"
            done
          done
          echo "Icons OK"

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "TigrinyaLearn"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.dcheshirecat.tigrinya'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dcheshirecat.tigrinya"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("keystore.jks")
                      storePassword "TigrinyaBuild2024"
                      keyAlias "tigrinya"
                      keyPassword "TigrinyaBuild2024"
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Build release APK
        run: gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TigrinyaLearn-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
