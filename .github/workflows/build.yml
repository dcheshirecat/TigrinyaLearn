name: Build Tigrinya APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Set up Android SDK ─────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Build the entire Android project from scratch ──────────────────
      #       Everything is generated here — no pre-committed Android files needed.
      - name: Generate Android project from index.html
        run: |
          set -e

          # ── Directory structure ──────────────────────────────────────────
          mkdir -p app/src/main/java/com/tigrinya/learn
          mkdir -p app/src/main/assets/public
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p gradle/wrapper

          # ── Copy your app ────────────────────────────────────────────────
          cp index.html app/src/main/assets/public/index.html

          # ── settings.gradle ──────────────────────────────────────────────
          cat > settings.gradle << 'EOF'
          rootProject.name = "TigrinyaLearn"
          include ':app'
          EOF

          # ── Root build.gradle ────────────────────────────────────────────
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # ── gradle.properties ────────────────────────────────────────────
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          # ── Gradle wrapper ────────────────────────────────────────────────
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # Download gradle wrapper jar
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar \
            -o gradle/wrapper/gradle-wrapper.jar

          # ── gradlew ───────────────────────────────────────────────────────
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
          chmod +x gradlew

          # ── App build.gradle ──────────────────────────────────────────────
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.tigrinya.learn"
                  minSdkVersion 22
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
              signingConfigs {
                  release {
                      storeFile file("keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASS")
                      keyAlias "tigrinya"
                      keyPassword System.getenv("KEYSTORE_PASS")
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              namespace "com.tigrinya.learn"
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.10.0'
          }
          EOF

          # ── AndroidManifest.xml ───────────────────────────────────────────
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <uses-permission android:name="android.permission.RECORD_AUDIO"/>
            <uses-permission android:name="android.permission.VIBRATE"/>
            <application
              android:allowBackup="true"
              android:label="ትግርኛ Learn"
              android:icon="@mipmap/ic_launcher"
              android:hardwareAccelerated="true"
              android:supportsRtl="false"
              android:theme="@style/AppTheme">
              <activity
                android:name=".MainActivity"
                android:exported="true"
                android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale"
                android:windowSoftInputMode="adjustResize">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          # ── activity_main.xml layout ──────────────────────────────────────
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent">
            <WebView
              android:id="@+id/webview"
              android:layout_width="match_parent"
              android:layout_height="match_parent"/>
          </FrameLayout>
          EOF

          # ── strings.xml ───────────────────────────────────────────────────
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">ትግርኛ Learn</string>
          </resources>
          EOF

          # ── themes.xml ────────────────────────────────────────────────────
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
              <item name="colorPrimary">#D4A017</item>
              <item name="colorPrimaryDark">#1A0E05</item>
              <item name="colorAccent">#D4A017</item>
              <item name="android:windowBackground">#1A0E05</item>
              <item name="android:statusBarColor">#1A0E05</item>
              <item name="android:navigationBarColor">#2B1A0D</item>
            </style>
          </resources>
          EOF

          # ── App icon (simple gold circle SVG → PNG via Python) ────────────
          python3 - << 'PYEOF'
          import struct, zlib, base64

          def make_png(size, r, g, b):
              # Create a simple solid-color PNG
              raw = bytes([0] + [r,g,b,255]*size) * size  # filter byte + RGBA per row
              def chunk(name, data):
                  c = zlib.crc32(name+data) & 0xffffffff
                  return struct.pack('>I',len(data)) + name + data + struct.pack('>I',c)
              ihdr = struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0)
              idat = zlib.compress(raw)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR',ihdr) + chunk(b'IDAT',idat) + chunk(b'IEND',b'')

          import os
          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144}
          for folder, sz in sizes.items():
              path = f'app/src/main/res/{folder}/ic_launcher.png'
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path,'wb') as f:
                  f.write(make_png(sz, 26, 14, 5))  # #1A0E05 dark background
          print('Icons created')
          PYEOF

          # ── MainActivity.java ─────────────────────────────────────────────
          cat > app/src/main/java/com/tigrinya/learn/MainActivity.java << 'JAVAEOF'
          package com.tigrinya.learn;

          import android.annotation.SuppressLint;
          import android.os.Bundle;
          import android.speech.tts.TextToSpeech;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;
          import java.util.Locale;

          public class MainActivity extends AppCompatActivity implements TextToSpeech.OnInitListener {
              private WebView webView;
              private TextToSpeech tts;
              private boolean ttsReady = false;

              @SuppressLint({"SetJavaScriptEnabled","JavascriptInterface"})
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  webView = findViewById(R.id.webview);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setMediaPlaybackRequiresUserGesture(false);

                  webView.addJavascriptInterface(new Bridge(), "NativeTTS");
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public void onPageFinished(WebView v, String url) {
                          webView.evaluateJavascript(
                              "if(window.onNativeTTSReady)window.onNativeTTSReady();", null);
                      }
                  });
                  webView.loadUrl("file:///android_asset/public/index.html");
                  tts = new TextToSpeech(this, this);
              }

              @Override
              public void onInit(int status) {
                  if (status == TextToSpeech.SUCCESS) {
                      Locale[] locs = {
                          new Locale("ti"), new Locale("am"),
                          new Locale("ti","ER"), new Locale("ti","ET")
                      };
                      for (Locale loc : locs) {
                          int r = tts.setLanguage(loc);
                          if (r != TextToSpeech.LANG_MISSING_DATA &&
                              r != TextToSpeech.LANG_NOT_SUPPORTED) break;
                      }
                      tts.setSpeechRate(0.82f);
                      ttsReady = true;
                      runOnUiThread(() ->
                          webView.evaluateJavascript(
                              "if(window.onNativeTTSReady)window.onNativeTTSReady();", null));
                  }
              }

              public class Bridge {
                  @JavascriptInterface
                  public void speak(String text) {
                      if (ttsReady && text != null && !text.trim().isEmpty())
                          tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, "tts");
                  }
                  @JavascriptInterface
                  public boolean isAvailable() { return ttsReady; }
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }

              @Override
              protected void onDestroy() {
                  if (tts != null) { tts.stop(); tts.shutdown(); }
                  super.onDestroy();
              }
          }
          JAVAEOF

          echo "✅ All project files generated"

      # ── 5. Generate a one-time keystore ───────────────────────────────────
      - name: Generate keystore
        run: |
          KEYSTORE_PASS=$(openssl rand -base64 16 | tr -dc 'A-Za-z0-9' | head -c 20)
          echo "KEYSTORE_PASS=${KEYSTORE_PASS}" >> $GITHUB_ENV

          keytool -genkeypair \
            -keystore app/keystore.jks \
            -alias tigrinya \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${KEYSTORE_PASS}" \
            -keypass "${KEYSTORE_PASS}" \
            -dname "CN=Tigrinya Learn, OU=App, O=TigrinyaLearn, L=Asmara, ST=Eritrea, C=ER" \
            -noprompt

          echo "✅ Keystore generated"

      # ── 6. Build release APK ──────────────────────────────────────────────
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PKEYSTORE_PASS="${KEYSTORE_PASS}" \
            --no-daemon \
            --stacktrace
        env:
          KEYSTORE_PASS: ${{ env.KEYSTORE_PASS }}

      # ── 7. Rename APK ─────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk \
             output/tigrinya-learn.apk
          echo "APK size: $(du -h output/tigrinya-learn.apk | cut -f1)"

      # ── 8. Upload APK as artifact ──────────────────────────────────────────
      #       Go to: Actions tab → click the run → download "tigrinya-apk"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tigrinya-apk
          path: output/tigrinya-learn.apk
          retention-days: 30

      # ── 9. Also attach APK to a GitHub Release (if you push a tag) ────────
      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/tigrinya-learn.apk
          name: "ትግርኛ Learn ${{ github.ref_name }}"
          body: |
            ## ትግርኛ Learn APK

            ### Install instructions
            1. Download `tigrinya-learn.apk` below
            2. On your Android phone: Settings → Security → allow "Install unknown apps"
            3. Open the downloaded APK and tap Install

            ### What's included
            - Native Android TTS (Tigrinya/Amharic audio)
            - 170+ words across 17 categories
            - Quiz, Flashcards by topic, Speed Round, Match Pairs
            - Listen & Choose, Word Search, Sentence Builder
            - 6 interactive stories
            - Fidel script trainer
            - Learning path A1→B2
            - 55 collectible cards
            - Leaderboard & achievements
