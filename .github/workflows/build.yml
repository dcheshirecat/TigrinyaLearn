name: Build BeadVault APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and Setup Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.4-bin.zip
        unzip gradle-8.4-bin.zip
        echo "GRADLE_HOME=$PWD/gradle-8.4" >> $GITHUB_ENV
        echo "$PWD/gradle-8.4/bin" >> $GITHUB_PATH

    - name: Create Android Project Structure
      run: |
        mkdir -p app/src/main/java/com/beadvault/app
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p app/src/main/assets

    - name: Copy index.html to assets
      run: cp index.html app/src/main/assets/

    - name: Create Root build.gradle
      run: |
        cat > build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
            }
        }

        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF

    - name: Create App build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.beadvault.app'
            compileSdk 34

            defaultConfig {
                applicationId "com.beadvault.app"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
            }

            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
        }
        EOF

    - name: Create settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        rootProject.name = "BeadVault"
        include ':app'
        EOF

    - name: Create gradle.properties
      run: |
        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

    - name: Create MainActivity.java
      run: |
        cat > app/src/main/java/com/beadvault/app/MainActivity.java << 'EOF'
        package com.beadvault.app;

        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebSettings;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                WebView webView = new WebView(this);
                setContentView(webView);

                WebSettings webSettings = webView.getSettings();
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webSettings.setDatabaseEnabled(true);
                webSettings.setAllowFileAccess(true);

                webView.loadUrl("file:///android_asset/index.html");
            }
        }
        EOF

    - name: Create AndroidManifest.xml
      run: |
        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.beadvault.app">

            <uses-permission android:name="android.permission.INTERNET" />

            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="BeadVault"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                android:usesCleartextTraffic="true">
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:configChanges="orientation|screenSize">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Create strings.xml
      run: |
        cat > app/src/main/res/values/strings.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <string name="app_name">BeadVault</string>
        </resources>
        EOF

    - name: Create colors.xml
      run: |
        cat > app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="purple_200">#9D174D</color>
            <color name="purple_500">#9D174D</color>
            <color name="purple_700">#831843</color>
            <color name="teal_200">#FEF7F0</color>
            <color name="teal_700">#F5E6D3</color>
            <color name="black">#FF000000</color>
            <color name="white">#FFFFFFFF</color>
        </resources>
        EOF

    - name: Generate App Icons with Python
      run: |
        pip install Pillow
        python3 << 'PYTHON_SCRIPT'
        from PIL import Image, ImageDraw, ImageFont
        import os

        sizes = {
            'mipmap-mdpi': 48,
            'mipmap-hdpi': 72,
            'mipmap-xhdpi': 96,
            'mipmap-xxhdpi': 144,
            'mipmap-xxxhdpi': 192
        }

        for folder, size in sizes.items():
            # Create gradient background
            img = Image.new('RGB', (size, size), '#9D174D')
            draw = ImageDraw.Draw(img)
            
            # Add decorative elements (beads)
            bead_size = max(4, size // 16)
            for x in range(3):
                for y in range(3):
                    pos_x = size // 4 + (x * size // 4)
                    pos_y = size // 4 + (y * size // 4)
                    draw.ellipse([pos_x - bead_size, pos_y - bead_size, 
                                pos_x + bead_size, pos_y + bead_size], 
                               fill='#6D28D9')
            
            # Save icon
            output_path = f'app/src/main/res/{folder}/ic_launcher.png'
            img.save(output_path)
            print(f"Created {output_path}")

        print("All icons generated successfully!")
        PYTHON_SCRIPT

    - name: Make gradlew executable
      run: chmod +x gradlew || true

    - name: Build APK
      run: |
        if [ -f ./gradlew ]; then
          ./gradlew assembleRelease --no-daemon
        else
          gradle-8.4/bin/gradle assembleRelease --no-daemon
        fi

    - name: Sign APK
      run: |
        # Generate a keystore for signing
        keytool -genkey -v -keystore beadvault.keystore -alias beadvault -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass android -keypass android \
          -dname "CN=BeadVault, OU=Development, O=BeadVault, L=Unknown, S=Unknown, C=US"
        
        # Get build tools directory
        BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools"
        LATEST_BUILD_TOOLS=$(ls -v $BUILD_TOOLS_DIR | tail -n 1)
        BUILD_TOOLS_PATH="$BUILD_TOOLS_DIR/$LATEST_BUILD_TOOLS"
        
        # Align the APK
        $BUILD_TOOLS_PATH/zipalign -v -p 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          app/build/outputs/apk/release/app-release-unsigned-aligned.apk
        
        # Sign the APK
        $BUILD_TOOLS_PATH/apksigner sign \
          --ks beadvault.keystore \
          --ks-key-alias beadvault \
          --ks-pass pass:android \
          --key-pass pass:android \
          --out app/build/outputs/apk/release/BeadVault-signed.apk \
          app/build/outputs/apk/release/app-release-unsigned-aligned.apk
        
        # Verify signature
        $BUILD_TOOLS_PATH/apksigner verify app/build/outputs/apk/release/BeadVault-signed.apk
        
        echo "APK signed successfully!"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: BeadVault-APK
        path: app/build/outputs/apk/release/BeadVault-signed.apk
        
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      continue-on-error: true
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: BeadVault v1.0.${{ github.run_number }}
        files: app/build/outputs/apk/release/BeadVault-signed.apk
        body: |
          🧵 BeadVault - Your Free Beading Pattern Library
          
          Features:
          - 10+ starter patterns (jewelry, 3D animals, amigurumi)
          - Pattern filtering by stitch type, difficulty, project type
          - Interactive stitch guides with diagrams
          - Pattern reading guides (wire & Fireline)
          - Favorite & completed project tracking
          - Community pattern submission
          
          Install the APK and start beading! ✨
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
